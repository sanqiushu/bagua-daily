name: Daily News Fetch & Deploy

on:
  schedule:
    # 每天 UTC 00:30 = 北京时间 08:30
    - cron: '30 0 * * *'
  workflow_dispatch: # 手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch today's news
        run: node scripts/fetch-news.js

      - name: Commit & push data
        run: |
          git config user.name "bagua-bot"
          git config user.email "bot@bagua.daily"
          git add data/
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d) daily news"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
