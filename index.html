<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八卦日报 | Daily Gossip</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 760px; margin: 0 auto; padding: 20px 16px; }
header { text-align: center; padding: 32px 0 20px; }
header h1 { font-size: 2rem; background: linear-gradient(135deg, #ff6b6b, #ffa502, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header p { color: #888; margin-top: 6px; font-size: 0.9rem; }

/* Tab Nav */
.tab-nav { display: flex; justify-content: center; gap: 0; margin: 20px 0 0; border-bottom: 2px solid #222; position: sticky; top: 0; background: #0a0a0a; z-index: 10; padding-top: 8px; }
.tab-nav button { padding: 12px 24px; border: none; background: none; color: #666; cursor: pointer; font-size: 1rem; font-weight: 600; position: relative; transition: color 0.2s; border-bottom: 3px solid transparent; margin-bottom: -2px; }
.tab-nav button:hover { color: #aaa; }
.tab-nav button.active { color: #fff; }
.tab-nav button[data-tab="all"].active { border-bottom-color: #ff6b6b; color: #ff6b6b; }
.tab-nav button[data-tab="AI"].active { border-bottom-color: #818cf8; color: #818cf8; }
.tab-nav button[data-tab="Crypto"].active { border-bottom-color: #4ade80; color: #4ade80; }
.tab-nav button[data-tab="Finance"].active { border-bottom-color: #fbbf24; color: #fbbf24; }
.tab-nav .tab-icon { margin-right: 6px; }

/* Date Nav */
.date-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 20px 0 8px; }
.date-nav button { background: #1a1a2e; border: 1px solid #333; color: #ccc; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; }
.date-nav button:hover { background: #2a2a4e; border-color: #555; }
.date-display { font-size: 1.2rem; font-weight: 600; min-width: 160px; text-align: center; color: #fff; }
.date-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 8px 0 20px; }
.date-list button { background: #1a1a2e; border: 1px solid #333; color: #aaa; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
.date-list button.active { background: #2a2a5e; border-color: #818cf8; color: #fff; }

/* Tab content */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Section */
.section { margin-bottom: 28px; }
.section-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 12px; padding: 8px 14px; border-radius: 8px; display: inline-block; }
.section-title.ai { background: #1a1a3e; color: #818cf8; }
.section-title.crypto { background: #1a2e1a; color: #4ade80; }
.section-title.finance { background: #2e2a1a; color: #fbbf24; }

/* Items */
.item { background: #111; border: 1px solid #222; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.2s; }
.item:hover { border-color: #444; }
.item.hot { border-left: 3px solid #ff6b6b; }
.hot-tag { font-size: 0.75rem; background: #ff6b6b22; color: #ff6b6b; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }
.item-zh { font-size: 0.95rem; line-height: 1.5; color: #e0e0e0; }
.item-en { font-size: 0.85rem; color: #888; margin-top: 4px; line-height: 1.4; }
.item a { color: #60a5fa; text-decoration: none; font-size: 0.8rem; margin-top: 6px; display: inline-block; }
.item a:hover { text-decoration: underline; }
.empty { text-align: center; color: #555; padding: 60px 0; font-size: 1.1rem; }

/* Tab count badge */
.tab-count { font-size: 0.75rem; background: #333; color: #aaa; padding: 1px 7px; border-radius: 10px; margin-left: 6px; }

footer { text-align: center; color: #444; font-size: 0.8rem; padding: 32px 0 16px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📰 八卦日报</h1>
    <p>AI · Crypto · Finance | 每日速递</p>
  </header>

  <nav class="tab-nav" id="tabNav">
    <button data-tab="all" class="active" onclick="switchTab('all')"><span class="tab-icon">📰</span>全部</button>
    <button data-tab="AI" onclick="switchTab('AI')"><span class="tab-icon">🤖</span>AI</button>
    <button data-tab="Crypto" onclick="switchTab('Crypto')"><span class="tab-icon">₿</span>Crypto</button>
    <button data-tab="Finance" onclick="switchTab('Finance')"><span class="tab-icon">💹</span>Finance</button>
  </nav>

  <div class="date-nav">
    <button onclick="changeDate(-1)">← 前一天</button>
    <div class="date-display" id="dateDisplay"></div>
    <button onclick="changeDate(1)">后一天 →</button>
  </div>
  <div class="date-list" id="dateList"></div>

  <div id="tabAll" class="tab-panel active"></div>
  <div id="tabAI" class="tab-panel"></div>
  <div id="tabCrypto" class="tab-panel"></div>
  <div id="tabFinance" class="tab-panel"></div>

  <footer>八卦君 · 信息仅供参考，不构成投资建议</footer>
</div>

<script>
const DATA_DIR = 'data/';
let currentDate = null;
let availableDates = [];
let currentData = null;
let activeTab = 'all';

async function init() {
  try {
    const res = await fetch(DATA_DIR + 'index.json');
    if (res.ok) availableDates = await res.json();
  } catch(e) {}

  if (!availableDates.length) {
    const today = new Date();
    for (let i = 0; i < 30; i++) {
      const d = new Date(today); d.setDate(d.getDate() - i);
      const ds = d.toISOString().split('T')[0];
      try { const r = await fetch(DATA_DIR + ds + '.json', { method: 'HEAD' }); if (r.ok) availableDates.push(ds); } catch(e) {}
    }
  }

  availableDates.sort((a, b) => b.localeCompare(a));
  renderDateList();
  availableDates.length ? loadDate(availableDates[0]) : showEmpty();
}

function renderDateList() {
  document.getElementById('dateList').innerHTML = availableDates.map(d =>
    `<button onclick="loadDate('${d}')" id="btn-${d}">${d}</button>`
  ).join('');
}

async function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('dateDisplay').textContent = dateStr;
  document.querySelectorAll('.date-list button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + dateStr);
  if (btn) btn.classList.add('active');

  try {
    const res = await fetch(DATA_DIR + dateStr + '.json');
    if (!res.ok) throw new Error();
    currentData = await res.json();
    renderAllTabs();
    updateTabCounts();
  } catch(e) { showEmpty(); }
}

function changeDate(offset) {
  if (!currentDate) return;
  const idx = availableDates.indexOf(currentDate);
  const newIdx = idx - offset;
  if (newIdx >= 0 && newIdx < availableDates.length) loadDate(availableDates[newIdx]);
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-nav button[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panelId = tab === 'all' ? 'tabAll' : 'tab' + tab;
  document.getElementById(panelId).classList.add('active');
}

function updateTabCounts() {
  if (!currentData) return;
  const counts = { all: 0, AI: 0, Crypto: 0, Finance: 0 };
  for (const s of currentData.sections) {
    counts[s.category] = (counts[s.category] || 0) + s.items.length;
    counts.all += s.items.length;
  }
  document.querySelectorAll('.tab-nav button').forEach(b => {
    const tab = b.dataset.tab;
    const existing = b.querySelector('.tab-count');
    if (existing) existing.remove();
    if (counts[tab]) b.innerHTML += `<span class="tab-count">${counts[tab]}</span>`;
  });
}

function renderItems(items) {
  return items.map(item => `
    <div class="item ${item.hot ? 'hot' : ''}">
      <div class="item-zh">${item.hot ? '🔥 ' : '• '}${item.zh}${item.hot ? '<span class="hot-tag">HOT</span>' : ''}${item.source ? ' <span style="color:#555;font-size:0.75rem">— ' + item.source + '</span>' : ''}</div>
      ${item.en ? '<div class="item-en">' + item.en + '</div>' : ''}
      <a href="${item.url}" target="_blank" rel="noopener">🔗 来源 / Source</a>
    </div>
  `).join('');
}

function renderSection(section) {
  const catClass = { AI: 'ai', Crypto: 'crypto', Finance: 'finance' };
  return `
    <div class="section">
      <div class="section-title ${catClass[section.category] || ''}">【${section.category}】</div>
      ${renderItems(section.items)}
    </div>`;
}

function renderAllTabs() {
  if (!currentData || !currentData.sections.length) { showEmpty(); return; }

  // All tab
  document.getElementById('tabAll').innerHTML = currentData.sections.map(s => renderSection(s)).join('');

  // Category tabs
  const cats = { AI: [], Crypto: [], Finance: [] };
  for (const s of currentData.sections) {
    if (cats[s.category]) cats[s.category].push(s);
  }

  for (const [cat, sections] of Object.entries(cats)) {
    const el = document.getElementById('tab' + cat);
    el.innerHTML = sections.length
      ? sections.map(s => renderItems(s.items)).join('')
      : '<div class="empty">暂无该分类新闻 📭</div>';
  }
}

function showEmpty() {
  ['tabAll', 'tabAI', 'tabCrypto', 'tabFinance'].forEach(id => {
    document.getElementById(id).innerHTML = '<div class="empty">暂无数据 📭</div>';
  });
}

init();
</script>
</body>
</html>
